name: backend-tests

on:
  push:
    paths: ["backend/**", ".github/workflows/backend-tests.yml"]
  pull_request:
    paths: ["backend/**", ".github/workflows/backend-tests.yml"]

jobs:
  pytest:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: dsa
          POSTGRES_PASSWORD: dsa
          POSTGRES_DB: algolog_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U dsa"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql+psycopg2://dsa:dsa@localhost:5432/algolog_test
      # Required by Settings (no default). Never contacted: tests override
      # require_user, so no JWT is ever verified against it.
      SUPABASE_PROJECT_URL: https://example.supabase.co

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests (unit + integration + e2e) with coverage
        run: pytest --cov=app --cov-report=term-missing

  docker:
    needs: pytest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/algolog-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/algolog-backend:${{ github.sha }}
