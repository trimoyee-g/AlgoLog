version: "3.9"

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: algolog-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: dsa
      POSTGRES_PASSWORD: dsa
      POSTGRES_DB: algolog
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dsa"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: algolog-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # First run: docker exec -it algolog-ollama ollama pull phi3
    # (see README for model pull instructions)

  backend:
    build: ./backend
    container_name: algolog-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://dsa:dsa@postgres:5432/algolog
      OLLAMA_BASE_URL: http://ollama:11434
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    volumes:
      - ./backend:/app

volumes:
  pgdata:
  ollama_data:
