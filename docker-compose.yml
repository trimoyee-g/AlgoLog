version: "3.9"

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: algolog-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: dsa
      POSTGRES_PASSWORD: dsa
      POSTGRES_DB: algolog
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dsa"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: algolog-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://dsa:dsa@postgres:5432/algolog
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  pgdata:
